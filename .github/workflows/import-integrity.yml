name: Import Integrity

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  import-integrity:
    name: package import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install common runtime deps
        run: pip install click requests Pillow pyyaml jinja2
      - name: Import every cli_anything package (catch split cycles / dropped re-exports)
        run: python .github/scripts/check_imports.py
